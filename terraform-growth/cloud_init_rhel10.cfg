# 4. Storage configuration

disk_setup:
  /dev/vda:
    table_type: 'gpt'
    layout:
      - [20, '8300']
      - [100, 'lvm']
    overwrite: false

lvm:
  vg_name: vg_root
  volumes:
    - name: lv_home
      size: 10G
      layout: [100]
	  - name: lv_var
      size: 10G
      layout: [100]
    - name: lv_swap
      size: 4G

fs_setup:
  - label: home
    filesystem: xfs
    device: /dev/vg_root/lv_home
  - label: var
    filesystem: xfs
	  device: /dev/vg_root/lv_var

mounts:
  - [ /dev/vg_root/lv_home, /home, "xfs", "defaults", "0", "2" ]
  - [ /dev/vg_root/lv_var, /var, "xfs", "defaults", "0", "2" ]
  - [ none, swap, sw, "defaults", "0", "0" ]

# 5. Post-Installation Commands
runcmd:
  - [ mkdir, -p, /opt/aap-installer ]
  - [ systemctl, enable, --now, firewalld ]
  - [ firewall-cmd, --permanent, --add-service=ssh ]
  - [ firewall-cmd, --permanent, --add-service=http ]
  - [ firewall-cmd, --permanent, --add-service=https ]
  - [ firewall-cmd, --reload ]
  - [ dnf, clean, all ]
  - [ mkswap, /dev/vg_root/lv_swap ]
  - [ swapon, /dev/vg_root/lv_swap ]
  - [ restorecon, -R, /home ]
  - [ restorecon, -R, /var ]
